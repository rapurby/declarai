[build]
# Pakai Dockerfile (bukan nixpacks) — nixpacks mendeteksi index.html dan
# ikut menjalankan Caddy yang serve source mentah (.jsx sebagai text/plain),
# penyebab layar putih. Dockerfile membuat prosesnya deterministik:
# npm ci -> vite build -> serve dist/.
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
